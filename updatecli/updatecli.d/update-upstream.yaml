---
name: "Update upstream version"
sources:
  upstream:
    name: Get upstream version
    kind: gittag
    scmid: upstream
    spec:
      versionfilter:
        kind: regex
        pattern: "^v[0-9]+.[0-9]+.[0-9]+-k3s[0-9]+"
  gomod:
    name: Get latest Golang version based on go.mod
    kind: file
    dependson:
      - "upstream"
    spec:
      file: 'https://raw.githubusercontent.com/{{ .github.upstream.owner }}/{{ .github.upstream.repository }}/{{ source "upstream" }}/go.mod'
      matchpattern: 'go ([0-9]+\.[0-9]+)'
    transformers:
      - trimprefix: "go "
  buildbase:
    name: Get build base version
    kind: githubrelease
    dependson:
      - "gomod"
    spec:
      owner: rancher
      repository: image-build-base
      token: '{{ requiredEnv .github.token }}'
      typefilter:
        release: true
        draft: false
        prerelease: false
      versionfilter:
        kind: regex
        pattern: '{{ source "gomod"}}\.\S+'
targets:
  dockerfile:
    name: 'Bump Dockerfile to upstream version {{ source "upstream" }}'
    kind: dockerfile
    scmid: default
    sourceid: upstream
    spec:
      file: "Dockerfile"
      instruction:
        keyword: "ARG"
        matcher: "TAG"
  makefile:
    name: 'Bump Makefile to upstream version {{ source "upstream" }}'
    kind: file
    scmid: default
    disablesourceinput: true
    spec:
      file: Makefile
      matchpattern: '(?m)^TAG \:\= (.*)'
      replacepattern: 'TAG := {{ source "upstream" }}$$(BUILD_META)'
  updatebuildbase:
    name: 'Bump Dockerfile to the latest build base version {{ source "buildbase" }}'
    kind: dockerfile
    scmid: default
    sourceid: buildbase
    spec:
      file: Dockerfile
      instruction:
        keyword: ARG
        matcher: "GO_IMAGE"
    transformers:
      - addprefix: "rancher/hardened-build-base:"
scms:
  upstream:
    kind: github
    spec:
      owner: '{{ .github.upstream.owner }}'
      repository: '{{ .github.upstream.repository }}'
      token: '{{ requiredEnv .github.token }}'
      branch: master
  default:
    kind: github
    spec:
      token: '{{ requiredEnv .github.token }}'
      username: '{{ requiredEnv .github.username }}'
      user: '{{ .github.user }}'
      email: '{{ .github.email }}'
      owner: '{{ .github.owner }}'
      repository: '{{ .github.repository }}'
      branch: '{{ .github.branch }}'
actions:
  default:
    title: 'Bump to upstream version {{ source "upstream" }}'
    kind: github/pullrequest
    spec:
      automerge: false
      labels:
        - chore
        - skip-changelog
        - status/auto-created
    scmid: default
