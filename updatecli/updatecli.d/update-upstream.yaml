---
name: "Update upstream version"

sources:
 upstream:
   name: Get upstream version
   kind: gittag
   scmid: upstream
   spec:
     versionfilter:
       kind: regex
       pattern: "^v[0-9]+.[0-9]+.[0-9]+-k3s[0-9]+"

targets:
  dockerfile:
    name: 'Bump Dockerfile to upstream version {{ source "upstream" }}'
    kind: dockerfile
    scmid: default
    sourceid: upstream
    spec:
      file: "Dockerfile"
      instruction:
        keyword: "ARG"
        matcher: "TAG"

  makefile:
    name: 'Bump Makefile to upstream version {{ source "upstream" }}'
    kind: file
    scmid: default
    disablesourceinput: true
    spec:
      file: Makefile
      matchpattern: '(?m)^TAG \:\= (.*)'
      replacepattern: 'TAG := {{ source "upstream" }}$$(BUILD_META)'

scms:
  upstream:
    kind: github
    spec:
      owner: k3s-io
      repository: etcd
      token: '{{ requiredEnv .github.token }}'
      branch: master
  default:
    kind: github
    spec:
      token: '{{ requiredEnv .github.token }}'
      username: '{{ requiredEnv .github.username }}'
      user: '{{ .github.user }}'
      email: '{{ .github.email }}'
      owner: '{{ .github.owner }}'
      repository: '{{ .github.repository }}'
      branch: '{{ .github.branch }}'

actions:
    default:
        title: 'Bump to upstream version {{ source "upstream" }}'
        kind: github/pullrequest
        spec:
            automerge: false
            labels:
                - chore
                - skip-changelog
                - status/auto-created
        scmid: default
